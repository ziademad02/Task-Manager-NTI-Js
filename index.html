<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Task Manager</title>
</head>
<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-[#0f0f0f] via-[#1a1a2e] via-[#6a0dad] to-[#ff1493] px-0 sm:px-6 md:px-8 py-8">
   <div class="app w-[90%] max-w-[800px] bg-black/90 backdrop-blur-md border border-white/10 rounded-[20px] p-6 md:p-10 shadow-[0_0_30px_rgba(255,20,147,0.4)]">
        <h1 data-aos="fade-down" class="text-center text-white text-3xl md:text-5xl tracking-wider mb-8" >
        Task Manager
        </h1>
        <form id="task-form" class="flex flex-col sm:flex-row gap-4 mb-8">
            <input type="text" id="task-input"  placeholder="Enter Task description" class="flex-1 p-4 rounded-xl bg-[#1e1e1e] text-white outline-none border-2 border-transparent  focus:border-pink-500 focus:shadow-[0_0_15px_#ff1493] placeholder:text-gray-400" />
            <button type="submit" class=" px-6 py-4 rounded-xl font-bold text-white bg-gradient-to-r from-pink-500 to-purple-600 hover:-translate-y-1 hover:shadow-[0_0_20px_#ff1493] transition" >
            Add Task
            </button>
        </form>
        <div id="task-list"></div>
        <div
            class="filters py-5 flex flex-wrap justify-center gap-4" >
            <button id="filter-all" class=" px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-105 transition" >
            All
            </button>
            <button id="filter-completed" class="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-105 transition">
            Completed
            </button>
            <button id="filter-pending" class="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-105 transition">
            Pending
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
